<figure style="text-align: center; margin: 0;">
  <a href="{{ site.baseurl }}/assets/images/{{ include.img_folder }}/{{ include.link_img }}">
    <img 
		style="display: block; margin: 0 auto; border 0;" 
		src="{{ site.baseurl }}/assets/images/{{ include.img_folder }}/{{ include.dith_img }}" 
		alt="{{ include.text }}" 
		onmouseover="this.src='./assets/images/{{ include.img_folder }}/{{ include.small_img }}';" 
		onmouseout="this.src='./assets/images/{{ include.img_folder }}/{{ include.dith_img }}';"
	>
  </a>
  <figcaption>{{ include.text }}</figcaption>
 </figure>
